<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Snooze Cub Computers</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav class="menu">
            <ul>
                <li><a href="index.html">🏠 Home</a></li>
                <li><a href="about.html">ℹ️ About Us</a></li>
                <li><a href="shop.html">🛒 Shop</a></li>
                <li><a href="contact.html">✉️ Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="contact-title">Contact Us</h1>

        <div class="contact-boxes">

            <div class="contact-box">
                <h2>Buyers</h2>
                <form action="https://formspree.io/f/xqeywdkg" method="POST">
                    <input type="text" name="name" placeholder="Name" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <textarea name="message" rows="8" placeholder="Message" required></textarea>
                    <button type="submit">Send</button>
                </form>
            </div>

            <div class="contact-box">
                <h2>Donors</h2>
                <form action="https://formspree.io/f/xyknldyo" method="POST">
                    <input type="text" name="name" placeholder="Name" required>
                    <input type="email" name="email" placeholder="Email" required>
                    <textarea name="message" rows="8" placeholder="Message" required></textarea>
                    <button type="submit">Send</button>
                </form>
            </div>

        </div>
    </main>

    <footer>
        <div class="footer-content">

            <p><strong>Snooze Cub Computers</strong></p>

            <p>Glens Falls, NY</p>

            <p>
                Email: snoozecubcomputers@gmail.com
            </p>

            <p>
                © 2026 Snooze Cub Computers. All rights reserved.
            </p>

        </div>
    </footer>

</body>
</html>
